name: Build and deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name
        id: meta
        run: echo "image=${REGISTRY}/${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - name: Deploy on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_PROJECT_PATH: ${{ secrets.VPS_PROJECT_PATH }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          APP_PORT: ${{ vars.APP_PORT }}
          APP_DOMAIN: ${{ vars.APP_DOMAIN }}
          TRAEFIK_CERT_RESOLVER: ${{ vars.TRAEFIK_CERT_RESOLVER }}
          TRAEFIK_NETWORK: ${{ vars.TRAEFIK_NETWORK }}
          APP_IMAGE: ${{ needs.build.outputs.image }}:latest
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          set -euo pipefail

          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$VPS_SSH_KEY"

          VPS_PORT="${VPS_PORT:-22}"
          OPENAI_MODEL="${OPENAI_MODEL:-gpt-5.4-mini}"
          APP_PORT="${APP_PORT:-3000}"
          APP_DOMAIN="${APP_DOMAIN:-screenshottodocx.srv1697356.hstgr.cloud}"
          TRAEFIK_CERT_RESOLVER="${TRAEFIK_CERT_RESOLVER:-mytlschallenge}"
          TRAEFIK_NETWORK="${TRAEFIK_NETWORK:-traefik-proxy}"
          DEPLOY_PATH="${VPS_PROJECT_PATH:-${DEPLOY_PATH:-/opt/screenshot-to-docx}}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$VPS_PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" "mkdir -p '$DEPLOY_PATH'"

          cat > docker-compose.deploy.yml <<'COMPOSE'
          services:
            app:
              image: ${APP_IMAGE}
              restart: unless-stopped
              env_file:
                - .env
              environment:
                NODE_ENV: production
                PORT: 3000
              expose:
                - "3000"
              labels:
                - "traefik.enable=true"
                - "traefik.docker.network=${TRAEFIK_NETWORK}"
                - "traefik.http.routers.screenshot-to-docx.rule=Host(`${APP_DOMAIN}`)"
                - "traefik.http.routers.screenshot-to-docx.entrypoints=websecure"
                - "traefik.http.routers.screenshot-to-docx.tls=true"
                - "traefik.http.routers.screenshot-to-docx.tls.certresolver=${TRAEFIK_CERT_RESOLVER}"
                - "traefik.http.routers.screenshot-to-docx-http.rule=Host(`${APP_DOMAIN}`)"
                - "traefik.http.routers.screenshot-to-docx-http.entrypoints=web"
                - "traefik.http.routers.screenshot-to-docx-http.middlewares=screenshot-to-docx-https"
                - "traefik.http.middlewares.screenshot-to-docx-https.redirectscheme.scheme=https"
                - "traefik.http.services.screenshot-to-docx.loadbalancer.server.port=3000"
              networks:
                - proxy
              healthcheck:
                test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/healthz"]
                interval: 30s
                timeout: 5s
                retries: 3
                start_period: 10s

          networks:
            proxy:
              name: ${TRAEFIK_NETWORK}
              external: true
          COMPOSE

          {
            printf 'APP_IMAGE=%s\n' "$APP_IMAGE"
            printf 'APP_PORT=%s\n' "$APP_PORT"
            printf 'APP_DOMAIN=%s\n' "$APP_DOMAIN"
            printf 'TRAEFIK_CERT_RESOLVER=%s\n' "$TRAEFIK_CERT_RESOLVER"
            printf 'TRAEFIK_NETWORK=%s\n' "$TRAEFIK_NETWORK"
            printf 'OPENAI_MODEL=%s\n' "$OPENAI_MODEL"

            if [ -n "$OPENAI_API_KEY" ]; then
              printf 'OPENAI_API_KEY=%s\n' "$OPENAI_API_KEY"
            fi
          } > app.env

          scp -i ~/.ssh/deploy_key -P "$VPS_PORT" docker-compose.deploy.yml "$VPS_USER@$VPS_HOST:$DEPLOY_PATH/docker-compose.yml"
          scp -i ~/.ssh/deploy_key -P "$VPS_PORT" app.env "$VPS_USER@$VPS_HOST:$DEPLOY_PATH/.env.new"

          ssh -i ~/.ssh/deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "set -euo pipefail
          cd '$DEPLOY_PATH'
          if [ -f .env ] && ! grep -q '^OPENAI_API_KEY=' .env.new && grep -q '^OPENAI_API_KEY=' .env; then
            grep '^OPENAI_API_KEY=' .env >> .env.new
          fi
          if ! grep -q '^OPENAI_API_KEY=' .env.new; then
            echo 'OPENAI_API_KEY is missing. Add it as a GitHub secret or keep it in the VPS .env file.' >&2
            exit 1
          fi
          mv .env.new .env
          if [ -n '$GHCR_USERNAME' ] && [ -n '$GHCR_TOKEN' ]; then
            printf '%s' '$GHCR_TOKEN' | docker login ghcr.io -u '$GHCR_USERNAME' --password-stdin
          fi
          docker compose pull
          docker compose up -d --remove-orphans
          docker image prune -f"
